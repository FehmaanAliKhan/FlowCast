<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowCast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }

    /* ── Theme CSS variables ─────────────────────────────────── */
    :root {
      --app-bg:      #F0F2F8;
      --card-bg:     #FFFFFF;
      --card-shadow: 0 1px 8px rgba(0,0,0,0.06);
      --sidebar-bg:  #13111C;
      --text-1:      #1A1A2E;
      --text-2:      #6B7280;
      --text-3:      #94a3b8;
      --text-4:      #c4c9d9;
      --border:      #e2e8f0;
      --input-bg:    #FFFFFF;
      --hover-bg:    #F8FAFC;
      --chip-bg:     #F0F2F8;
      --divider:     #f1f5f9;
    }
    html.dark {
      --app-bg:      #0D0C18;
      --card-bg:     #1A1826;
      --card-shadow: 0 1px 16px rgba(0,0,0,0.45);
      --sidebar-bg:  #0D0C18;
      --text-1:      #EFEFFB;
      --text-2:      rgba(255,255,255,0.55);
      --text-3:      rgba(255,255,255,0.35);
      --text-4:      rgba(255,255,255,0.2);
      --border:      rgba(255,255,255,0.08);
      --input-bg:    #252335;
      --hover-bg:    rgba(255,255,255,0.04);
      --chip-bg:     rgba(255,255,255,0.06);
      --divider:     rgba(255,255,255,0.06);
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fade-in 0.2s ease-out; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    html.dark ::-webkit-scrollbar-thumb { background: #334155; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    html, body, #root { height: 100%; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Recharts deps + Recharts 2.6.2 -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/recharts@2.6.2/umd/Recharts.js" crossorigin="anonymous"></script>

  <!-- Global aliases shared across all Babel scopes (var to allow re-assignment without const conflicts) -->
  <script>
    // React hooks
    var useState     = React.useState;
    var useEffect    = React.useEffect;
    var useReducer   = React.useReducer;
    var useMemo      = React.useMemo;
    var useCallback  = React.useCallback;
    var useRef       = React.useRef;
    var useContext   = React.useContext;
    var createContext = React.createContext;

    // Recharts (safe: window.Recharts may be undefined if CDN fails)
    var _RC = window.Recharts || {};
    var ResponsiveContainer = _RC.ResponsiveContainer;
    var LineChart      = _RC.LineChart;
    var Line           = _RC.Line;
    var AreaChart      = _RC.AreaChart;
    var Area           = _RC.Area;
    var ComposedChart  = _RC.ComposedChart;
    var BarChart       = _RC.BarChart;
    var Bar            = _RC.Bar;
    var PieChart       = _RC.PieChart;
    var Pie            = _RC.Pie;
    var Cell           = _RC.Cell;
    var XAxis          = _RC.XAxis;
    var YAxis          = _RC.YAxis;
    var CartesianGrid  = _RC.CartesianGrid;
    var Tooltip        = _RC.Tooltip;
    var Legend         = _RC.Legend;
    var ReferenceLine  = _RC.ReferenceLine;
    var ReferenceArea  = _RC.ReferenceArea;
  </script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <!-- Pure JS (no JSX) — order matters -->
  <script src="lib.js"></script>
  <script src="engine.js"></script>
  <script src="seed.js"></script>
  <script src="api.js"></script>

  <!-- React / JSX components — loaded in dependency order -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="state.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="nav.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel" src="welcome.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="transactions.jsx"></script>
  <script type="text/babel" src="recurring.jsx"></script>
  <script type="text/babel" src="scenarios.jsx"></script>
  <script type="text/babel" src="goals.jsx"></script>
  <script type="text/babel" src="settings.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
